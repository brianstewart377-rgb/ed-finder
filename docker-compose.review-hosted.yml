services:
  review-postgres:
    mem_limit: 2g
    cpus: 2.0

  review-redis:
    mem_limit: 256m
    cpus: 0.5

  review-api:
    mem_limit: 1g
    cpus: 1.0
    environment:
      CORS_ORIGINS: https://review.ed-finder.app
    networks:
      - review
      - review-edge

networks:
  review:
    name: edfinder-review-hosted-network

  review-edge:
    name: edfinder-review-edge
    external: true

volumes:
  review_postgres_data:
    name: edfinder_review_hosted_postgres_data

  review_redis_data:
    name: edfinder_review_hosted_redis_data
