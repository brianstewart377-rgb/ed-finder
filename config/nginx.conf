worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log  /var/log/nginx/error.log  warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml
        font/woff font/woff2;

    # Security headers
    # NOTE: X-XSS-Protection is deprecated — removed. Modern browsers ignore
    # it and Safari's implementation has been a source of vulnerabilities.
    # The Content-Security-Policy below is the real XSS defence.
    add_header X-Frame-Options        "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"          always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # Hide nginx version
    server_tokens off;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=search:10m rate=10r/s;

    # ── Upstream definition ──────────────────────────────────────────────────
    # Using an upstream block instead of set $variable + proxy_pass.
    # This lets nginx resolve the Docker DNS name at startup and keeps
    # persistent keepalive connections to the API workers.
    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    # ── HTTP server (Cloudflare Flexible SSL + ACME challenges) ─────────────
    server {
        listen 80;
        listen [::]:80;
        server_name ed-finder.app www.ed-finder.app;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # API proxy on plain HTTP
        # Cloudflare Flexible SSL: CF terminates TLS, sends HTTP to origin
        location /api/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_connect_timeout 10s;
            proxy_read_timeout    300s;
        }

        location / {
            root  /var/www/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }

    # ── HTTPS main server ────────────────────────────────────────────────────
    # NOTE: nginx will crash on startup if the cert files do not exist.
    # Comment out this entire server {} block if certs are not yet issued,
    # then re-enable after running: certbot certonly --nginx -d ed-finder.app
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name ed-finder.app www.ed-finder.app;

        # SSL certificates (Let's Encrypt)
        ssl_certificate     /etc/letsencrypt/live/ed-finder.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ed-finder.app/privkey.pem;

        # Modern SSL configuration
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;

        # HSTS (1 year)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        root /var/www/html;
        index index.html;

        # ── Static frontend files ──────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # index.html is the app shell — NEVER cache it client-side.
        # Every deploy swaps the script/CSS it references; caching it for an
        # hour means the user sees stale UI after we ship a new version.
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            expires -1;
        }
        location = / {
            try_files /index.html =404;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            expires -1;
        }

        # Long-lived cache for images/fonts
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 30d;
            add_header Cache-Control "public, immutable, max-age=2592000";
        }

        # No cache for app logic and styles (since we don't use hashes in filenames)
        location ~* \.(js|css)$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        # ── Live EDDN Feed (SSE) ───────────────────────────────────────────
        location = /api/events/live {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Critical for SSE: disable buffering and keep connection open
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 24h;
            chunked_transfer_encoding on;
            tcp_nopush         off;
            tcp_nodelay        on;
        }

        # ── API proxy ──────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=60 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout    300s;
            proxy_send_timeout    60s;

            proxy_buffering    on;
            proxy_buffer_size  16k;
            proxy_buffers      8 32k;
        }

        # Stricter rate limit for heavy search endpoints
        location ~ ^/api/(local/search|search/galaxy|search/cluster) {
            limit_req zone=search burst=20 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout 120s;
        }

        # ── Health check (no rate limit) ───────────────────────────────────
        location = /api/health {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            access_log off;
        }

        # Block metrics from public
        location = /api/metrics {
            allow 127.0.0.1;
            deny  all;
            proxy_pass http://api_backend;
        }

        # Admin endpoints — even though the API requires a bearer token
        # (ADMIN_TOKEN), block them from the public internet as defence in
        # depth. Call them via `curl -H "X-Admin-Token: $TOKEN"
        # http://localhost/api/admin/...` from the Hetzner host.
        location ^~ /api/admin/ {
            allow 127.0.0.1;
            deny  all;
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Admin-Token     $http_x_admin_token;
            proxy_read_timeout 300s;
        }

        # Same protection on the cache-clear endpoint.
        location = /api/cache/clear {
            allow 127.0.0.1;
            deny  all;
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Admin-Token     $http_x_admin_token;
        }
    }
}
