worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log  /var/log/nginx/error.log  warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml
        font/woff font/woff2;

    # CI syntax-only sandbox config. Keep this aligned with config/nginx.conf
    # for the HTTP and hosted-review lanes, but omit the TLS server block so
    # nginx -t does not need Let's Encrypt material inside the runner.
    server_tokens off;

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=search:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=review_api:10m rate=30r/s;

    resolver 127.0.0.11 valid=10s ipv6=off;
    map $host $api_origin {
        default http://127.0.0.1:8000;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name ed-finder.app www.ed-finder.app;
        root /tmp/ngx/www;
        index index.html;

        include /tmp/ngx/snippets/security-headers.conf;

        location /.well-known/acme-challenge/ {
            root /tmp/ngx/www;
        }

        location = /nginx-healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location = /v2 { return 301 https://$host/; }
        location = /v2/ { return 301 https://$host/; }
        location ~ ^/v2/(.*)$ { return 301 https://$host/$1; }

        location ^~ /assets/ {
            try_files $uri =404;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            include /tmp/ngx/snippets/security-headers.conf;
        }

        location = /index.html {
            try_files /index.html =404;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            include /tmp/ngx/snippets/security-headers.conf;
        }

        location /api/ {
            proxy_pass         $api_origin;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_connect_timeout 10s;
            proxy_read_timeout    300s;
        }

        location ~ ^/s/[0-9]+$ {
            proxy_pass         $api_origin;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   User-Agent        $http_user_agent;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        location / {
            try_files $uri /index.html;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            include /tmp/ngx/snippets/security-headers.conf;
        }
    }

    server {
        listen 80;
        listen [::]:80;
        server_name review.ed-finder.app;

        access_log /tmp/ngx/logs/review-access.log main buffer=32k flush=5s;
        error_log  /tmp/ngx/logs/review-error.log warn;

        include /tmp/ngx/snippets/security-headers.conf;

        auth_basic "ED Finder hosted review";
        auth_basic_user_file /etc/nginx/review.htpasswd;

        resolver 127.0.0.11 valid=10s ipv6=off;
        set $review_api_origin http://127.0.0.1:8000;

        root /tmp/ngx/www;
        index index.html;

        location ^~ /api/admin/ {
            return 403;
        }

        location = /api/cache/clear {
            return 403;
        }

        location = /api/metrics {
            return 403;
        }

        location /api/ {
            limit_req zone=review_api burst=60 nodelay;

            proxy_pass         $review_api_origin;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;

            proxy_connect_timeout 10s;
            proxy_read_timeout    300s;
            proxy_send_timeout    60s;
        }

        location ^~ /assets/ {
            try_files $uri =404;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            include /tmp/ngx/snippets/security-headers.conf;
        }

        location = /index.html {
            try_files /index.html =404;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            include /tmp/ngx/snippets/security-headers.conf;
        }

        location / {
            try_files $uri /index.html;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            include /tmp/ngx/snippets/security-headers.conf;
        }
    }
}
