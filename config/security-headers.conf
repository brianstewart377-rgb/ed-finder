# ── Security headers snippet ─────────────────────────────────────────────
# IMPORTANT: nginx's `add_header` directive is NOT inherited from a parent
# context if the current context declares its own `add_header`. Therefore
# this snippet MUST be `include`-d in every `server {}` and `location {}`
# block that declares any `add_header` of its own (e.g. Cache-Control,
# HSTS), otherwise the browser gets NO CSP / X-Frame-Options / etc.
#
# Keep this file as the single source of truth for HTTP security headers.
# The HSTS header is only valid over HTTPS but is harmless on HTTP; we
# keep it here so both server blocks send the same policy.
add_header X-Frame-Options        "SAMEORIGIN"                           always;
add_header X-Content-Type-Options "nosniff"                              always;
add_header Referrer-Policy        "strict-origin-when-cross-origin"      always;
add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;

# v3.1 CSP — allows inline <script>, inline on* handlers, and inline style="…"
# attributes because the app is a single monolithic index.html. The
# `script-src-attr` / `style-src-attr` directives MUST be set explicitly —
# Firefox and CSP Level 3 browsers do NOT fall back from -attr variants to
# the generic `script-src` / `style-src`, so `onclick="…"` attributes get
# blocked unless -attr is named directly.
add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-attr 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-hashes'; script-src-attr 'unsafe-inline' 'unsafe-hashes'; img-src 'self' data: blob:; connect-src 'self'; worker-src 'self' blob:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
