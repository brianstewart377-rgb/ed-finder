<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ED Finder | Elite Dangerous Colonisation Planner</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#0a0c0e">
</head>
<body>

<div id="app-container" style="display: none; opacity: 0; transition: opacity 0.5s ease;">
  <header id="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">◉</span>
        <span class="logo-text">ED <strong>Finder</strong></span>
        <span class="logo-sub">Colonisation</span>
      </div>
      
      <nav id="main-nav">
        <button class="nav-btn" data-tab="local">Local Search</button>
        <button class="nav-btn" data-tab="galaxy">Galaxy Search</button>
        <button class="nav-btn" data-tab="cluster">Cluster Search</button>
        <button class="nav-btn" data-tab="watchlist">Watchlist</button>
      </nav>

      <div class="header-status">
        <div id="status-badge" class="status-badge">
          <span class="status-dot"></span>
          <span class="status-text">API</span>
        </div>
      </div>
    </div>
  </header>

  <main id="main-content">
    <section id="tab-local" class="tab-panel">
      <div class="panel-layout">
        <aside class="search-panel">
          <h2 class="panel-title">Local Search</h2>
          <div class="field-group">
            <label class="field-label">Reference System</label>
            <input type="text" id="local-ref-input" class="field-input" placeholder="e.g. Sol">
          </div>
          <button id="local-search-btn" class="search-btn">Search</button>
        </aside>
        <div class="results-panel">
          <div id="local-results" class="results-list"></div>
        </div>
      </div>
    </section>

    <section id="tab-galaxy" class="tab-panel" hidden>
      <div class="panel-layout">
        <aside class="search-panel">
          <h2 class="panel-title">Galaxy Search</h2>
          <button id="galaxy-search-btn" class="search-btn">Search Galaxy</button>
        </aside>
        <div class="results-panel">
          <div id="galaxy-results" class="results-list"></div>
        </div>
      </div>
    </section>

    <section id="tab-cluster" class="tab-panel" hidden>
      <div class="panel-layout">
        <aside class="search-panel">
          <h2 class="panel-title">Cluster Search</h2>
          <button id="cluster-search-btn" class="search-btn">Find Clusters</button>
        </aside>
        <div class="results-panel">
          <div id="cluster-results" class="results-list"></div>
        </div>
      </div>
    </section>

    <section id="tab-watchlist" class="tab-panel" hidden>
      <div class="panel-layout">
        <aside class="search-panel">
          <h2 class="panel-title">Watchlist</h2>
        </aside>
        <div class="results-panel">
          <div id="watchlist-results" class="results-list"></div>
        </div>
      </div>
    </section>
  </main>
</div>

<div id="toast" class="toast" hidden></div>

<script src="app.js"></script>
</body>
</html>
