worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log  /var/log/nginx/error.log  warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml
        font/woff font/woff2;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"          always;
    add_header X-XSS-Protection       "1; mode=block"   always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    # Hide nginx version
    server_tokens off;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=search:10m rate=10r/s;

    # Upstream — FastAPI backend
    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name ed-finder.app www.ed-finder.app;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://www.ed-finder.app$request_uri;
        }
    }

    # ── HTTPS main server ────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name ed-finder.app www.ed-finder.app;

        # SSL certificates (Let's Encrypt)
        ssl_certificate     /etc/letsencrypt/live/ed-finder.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ed-finder.app/privkey.pem;

        # Modern SSL configuration
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;
        ssl_stapling              on;
        ssl_stapling_verify       on;
        resolver                  1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout          5s;

        # HSTS (1 year)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        root /var/www/html;
        index index.html;

        # ── Static frontend files ──────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # Long-lived cache for hashed static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 30d;
            add_header Cache-Control "public, immutable, max-age=2592000";
        }

        # ── API proxy ──────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=60 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    30s;

            proxy_buffering    on;
            proxy_buffer_size  16k;
            proxy_buffers      8 32k;
        }

        # Stricter rate limit for heavy search endpoints
        location ~ ^/api/(local/search|search/galaxy|search/cluster) {
            limit_req zone=search burst=20 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout 120s;   # cluster search can take a moment
        }

        # ── Health check (no rate limit) ───────────────────────────────────
        location = /api/health {
            proxy_pass http://api_backend;
            access_log off;
        }

        # Block metrics from public
        location = /api/metrics {
            allow 127.0.0.1;
            deny  all;
            proxy_pass http://api_backend;
        }
    }
}
