name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    name: Smoke tests + syntax checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Python syntax check (py_compile, all .py)
        run: python -m compileall -q backend

      - name: Run unit tests (no DB required)
        run: |
          python -m unittest tests.test_smoke -v

      - name: Validate docker-compose.yml
        uses: docker/setup-buildx-action@v3
      - run: docker compose --project-directory . config --quiet

      - name: Node 20 for JS syntax check
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: JS syntax check (node --check)
        run: node --check frontend/app.js
