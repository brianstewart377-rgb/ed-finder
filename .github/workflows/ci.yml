name: CI

# Triggers: push & PR to main, plus manual "Run workflow" via Actions UI.
# Free on public repos. Cancels in-flight runs of the same branch when a
# new push arrives so we never queue redundant builds.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group:               ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress:  true

jobs:
  # ─── Backend ────────────────────────────────────────────────────────
  backend:
    name: Backend smoke tests + compose validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/eddn/requirements.txt
            apps/importer/requirements.txt

      - name: Install backend dependencies (api + eddn + importer)
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install -r apps/eddn/requirements.txt
          pip install -r apps/importer/requirements.txt

      - name: Python syntax check (py_compile, all .py under apps/)
        run: python -m compileall -q apps

      - name: Run unit tests (no DB required)
        run: python -m unittest discover -s tests -p "test_smoke.py"

      - name: Set up Docker buildx (for compose validate)
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose.yml
        run: docker compose --project-directory . config --quiet

  # ─── Backend integration tests (Postgres + Redis) ──────────────────
  # Audit fix Phase 6: real DB-backed integration tests. Spawns a
  # PG service container, applies the schema migrations, seeds a
  # tiny dataset, runs every test under tests/integration/.
  integration:
    name: Backend integration (PG+Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     edfinder
          POSTGRES_PASSWORD: edfinder
          POSTGRES_DB:       edfinder
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            tests/integration/requirements.txt

      - name: Install API + integration test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Apply schema + seed
        env:
          PGPASSWORD: edfinder
        run: |
          for f in sql/001_schema.sql sql/002_indexes.sql sql/003_functions.sql \
                   sql/004_ratings_v31.sql sql/005_map_indexes.sql \
                   sql/007_profile_sync.sql sql/008_body_filter_aggregates.sql \
                   sql/009_map_materialised_views.sql sql/010_sync_key_scoping.sql sql/011_autocomplete_index.sql \
                   sql/seed_preview.sql ; do
            psql -h localhost -U edfinder -d edfinder -f "$f"
          done

      - name: Seed ratings rows for integration tests
        env:
          PGPASSWORD: edfinder
        run: |
          psql -h localhost -U edfinder -d edfinder <<SQL
          INSERT INTO ratings (system_id64, score, score_agriculture, score_refinery,
            score_industrial, score_hightech, score_military, score_tourism,
            score_extraction, slots, body_quality, compactness, signal_quality,
            orbital_safety, star_bonus, elw_count, ww_count, ammonia_count,
            gas_giant_count, neutron_count, black_hole_count, white_dwarf_count,
            landable_count, terraformable_count, bio_signal_total, geo_signal_total,
            terraforming_potential, body_diversity, confidence, hmc_count,
            metal_rich_count, rocky_count, rocky_ice_count, icy_count,
            other_star_count, ring_count, walkable_count)
          SELECT s.id64, ((s.id64 % 50) + 50)::int, ((s.id64 % 30) + 60)::int,
            ((s.id64 % 25) + 50)::int, ((s.id64 % 35) + 55)::int, ((s.id64 % 40) + 45)::int,
            ((s.id64 % 28) + 52)::int, ((s.id64 % 33) + 47)::int, ((s.id64 % 26) + 60)::int,
            ((s.id64 % 5) + 1)::int, 60, 50, 70, 80, 5,
            (s.id64 % 3)::int, (s.id64 % 4)::int, (s.id64 % 2)::int,
            (s.id64 % 6)::int, (s.id64 % 2)::int, 0, 0, 5, 2, 10, 20, 30,
            ((s.id64 % 30))::int, 0.85, 4, 1, 6, 2, 1, 2, 3, 2
          FROM systems s ON CONFLICT DO NOTHING;
          SELECT * FROM refresh_map_mviews(FALSE);
          SQL

      - name: Run integration test suite
        env:
          DATABASE_URL: postgresql://edfinder:edfinder@localhost:5432/edfinder
          REDIS_URL:    redis://localhost:6379/15
          CORS_ORIGINS: http://test
          ADMIN_TOKEN:  test-admin-token
          LOG_LEVEL:    WARNING
        run: python -m pytest tests/integration/ -v


  # ─── Frontend v2 ────────────────────────────────────────────────────
  # Catches the exact class of "file got swallowed by .gitignore" bug we
  # hit on Hetzner. If `frontend-v2/src/lib/api.ts` ever gets ignored
  # again, this job fails on PR before it ever reaches production.
  v2:
    name: Frontend v2 build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-v2
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify required source files are present
        # Sanity check that catches the .gitignore-eating-lib regression
        # in <1 s, without waiting for a full Vite build.
        run: |
          set -e
          for f in \
            src/lib/api.ts \
            src/lib/format.ts \
            src/types/api.ts \
            src/components/NavBar.tsx \
            src/components/ResultCard.tsx \
            src/features/search/SearchForm.tsx \
            src/features/search/useSearch.ts \
            src/features/search/useAutocomplete.ts \
            src/features/watchlist/WatchlistTab.tsx \
            src/features/watchlist/useWatchlist.ts \
            src/features/map/GalacticMap.tsx \
            src/features/map/MapTab.tsx \
            src/hooks/useDebounced.ts \
            src/hooks/useHashRoute.ts; do
            test -f "$f" || { echo "::error file=frontend-v2/$f::missing — likely globbed out by a parent .gitignore"; exit 1; }
          done
          echo "✓ all required v2 source files present"

      - name: Install (no frozen lockfile — yarn.lock is intentionally not in repo)
        # Emergent's auto-commit strips lockfiles; install fresh each time.
        run: yarn install --no-progress --non-interactive

      - name: Type-check
        run: yarn typecheck

      - name: Vitest unit tests (Phase 7 stores + hooks)
        run: yarn test --run

      - name: Build
        run: yarn build

      - name: Upload dist artefact
        # Lets us grab a build out of CI if we ever need to bypass the
        # Hetzner build step (e.g. node/yarn unavailable on the dedi).
        uses: actions/upload-artifact@v4
        with:
          name: frontend-v2-dist
          path: frontend-v2/dist
          retention-days: 7

  # ─── Nginx config ───────────────────────────────────────────────────
  # `nginx -t` against our composed config catches the *other* class of
  # bug we hit (CSP/security-headers misconfiguration, /v2/ alias typos,
  # etc.) without needing a Hetzner round-trip.
  nginx:
    name: Nginx config syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nginx
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nginx

      - name: Test nginx config
        run: |
          set -e
          # Build a temporary tree that mimics the docker mount layout.
          mkdir -p /tmp/ngx/snippets /tmp/ngx/www /tmp/ngx/v2
          cp config/nginx.conf            /tmp/ngx/nginx.conf
          cp config/security-headers.conf /tmp/ngx/snippets/security-headers.conf
          # Patch paths that wouldn't exist in the runner sandbox.
          sed -i 's|/etc/nginx/snippets/security-headers.conf|/tmp/ngx/snippets/security-headers.conf|g' /tmp/ngx/nginx.conf
          # Replace upstream + comment out HTTPS server block (no certs in CI).
          sed -i 's|server api:8000;|server 127.0.0.1:8000;|' /tmp/ngx/nginx.conf
          python3 - <<'PY'
          path = '/tmp/ngx/nginx.conf'
          lines = open(path).read().split('\n')
          out, inside, depth, started = [], False, 0, False
          for line in lines:
              if 'listen 443 ssl' in line:
                  inside = True
              if inside:
                  out.append('# ' + line)
                  depth += line.count('{')
                  depth -= line.count('}')
                  if started and depth == 0:
                      inside = False
                  if '{' in line:
                      started = True
              else:
                  out.append(line)
          open(path, 'w').write('\n'.join(out))
          PY
          sudo nginx -t -c /tmp/ngx/nginx.conf -p /tmp/ngx

  # ─── OpenAPI type generation drift check ──────────────────────────
  # Audit Phase 7: ensures frontend-v2/src/types/api.gen.ts stays in sync
  # with the API's actual OpenAPI schema. Boots PG+Redis+API, regenerates
  # types via openapi-typescript, fails on drift. To fix: run
  # `cd frontend-v2 && yarn types:gen` locally (with API on :8000) and
  # commit the updated src/types/api.gen.ts.
  openapi-types:
    name: OpenAPI types drift check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     edfinder
          POSTGRES_PASSWORD: edfinder
          POSTGRES_DB:       edfinder
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install API deps
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Apply schema migrations
        env:
          PGPASSWORD: edfinder
        run: |
          for f in sql/001_schema.sql sql/002_indexes.sql sql/003_functions.sql \
                   sql/004_ratings_v31.sql sql/005_map_indexes.sql \
                   sql/007_profile_sync.sql sql/008_body_filter_aggregates.sql \
                   sql/009_map_materialised_views.sql sql/010_sync_key_scoping.sql sql/011_autocomplete_index.sql ; do
            psql -h localhost -U edfinder -d edfinder -f "$f"
          done

      - name: Boot API in background
        env:
          DATABASE_URL: postgresql://edfinder:edfinder@localhost:5432/edfinder
          REDIS_URL:    redis://localhost:6379/0
          CORS_ORIGINS: http://test
          ADMIN_TOKEN:  test-admin-token
          LOG_LEVEL:    WARNING
        working-directory: apps/api/src
        run: |
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 8000 > /tmp/uvicorn.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/health >/dev/null 2>&1; then
              echo "API ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::API failed to start within 30s"
          tail -100 /tmp/uvicorn.log
          exit 1

      - name: Install frontend-v2 deps
        working-directory: frontend-v2
        run: yarn install --no-progress --non-interactive

      - name: Regenerate types from running API
        working-directory: frontend-v2
        env:
          VITE_OPENAPI_URL: http://127.0.0.1:8000/openapi.json
        run: yarn types:gen

      - name: Check for drift against checked-in api.gen.ts
        working-directory: frontend-v2
        run: |
          if ! git diff --exit-code src/types/api.gen.ts; then
            echo "::error::API types are out of date. Run 'cd frontend-v2 && yarn types:gen' locally and commit src/types/api.gen.ts."
            exit 1
          fi
          echo "✓ types match checked-in baseline"

  # ─── End-to-end (Playwright + vite preview) ────────────────────────
  # Audit Phase 6 follow-up: runs the smoke spec end-to-end against a
  # production `vite build` served by `vite preview`, with the Vite
  # preview server proxying /api to a freshly-booted FastAPI talking to
  # a real PG+Redis service container. This is the closest we get to a
  # production round-trip without paying for a hosted preview env.
  e2e:
    name: Frontend v2 E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     edfinder
          POSTGRES_PASSWORD: edfinder
          POSTGRES_DB:       edfinder
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install API deps
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Apply schema + seed
        env:
          PGPASSWORD: edfinder
        run: |
          for f in sql/001_schema.sql sql/002_indexes.sql sql/003_functions.sql \
                   sql/004_ratings_v31.sql sql/005_map_indexes.sql \
                   sql/007_profile_sync.sql sql/008_body_filter_aggregates.sql \
                   sql/009_map_materialised_views.sql sql/010_sync_key_scoping.sql sql/011_autocomplete_index.sql \
                   sql/seed_preview.sql ; do
            psql -h localhost -U edfinder -d edfinder -f "$f"
          done
          # Same ratings seed as the integration job — gives /api/local/search
          # something to return.
          psql -h localhost -U edfinder -d edfinder <<SQL
          INSERT INTO ratings (system_id64, score, score_agriculture, score_refinery,
            score_industrial, score_hightech, score_military, score_tourism,
            score_extraction, slots, body_quality, compactness, signal_quality,
            orbital_safety, star_bonus, elw_count, ww_count, ammonia_count,
            gas_giant_count, neutron_count, black_hole_count, white_dwarf_count,
            landable_count, terraformable_count, bio_signal_total, geo_signal_total,
            terraforming_potential, body_diversity, confidence, hmc_count,
            metal_rich_count, rocky_count, rocky_ice_count, icy_count,
            other_star_count, ring_count, walkable_count)
          SELECT s.id64, ((s.id64 % 50) + 50)::int, ((s.id64 % 30) + 60)::int,
            ((s.id64 % 25) + 50)::int, ((s.id64 % 35) + 55)::int, ((s.id64 % 40) + 45)::int,
            ((s.id64 % 28) + 52)::int, ((s.id64 % 33) + 47)::int, ((s.id64 % 26) + 60)::int,
            ((s.id64 % 5) + 1)::int, 60, 50, 70, 80, 5,
            (s.id64 % 3)::int, (s.id64 % 4)::int, (s.id64 % 2)::int,
            (s.id64 % 6)::int, (s.id64 % 2)::int, 0, 0, 5, 2, 10, 20, 30,
            ((s.id64 % 30))::int, 0.85, 4, 1, 6, 2, 1, 2, 3, 2
          FROM systems s ON CONFLICT DO NOTHING;
          SELECT * FROM refresh_map_mviews(FALSE);
          SQL

      - name: Boot API in background
        env:
          DATABASE_URL: postgresql://edfinder:edfinder@localhost:5432/edfinder
          REDIS_URL:    redis://localhost:6379/0
          CORS_ORIGINS: http://localhost:4173
          ADMIN_TOKEN:  test-admin-token
          LOG_LEVEL:    WARNING
        working-directory: apps/api/src
        run: |
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 8002 > /tmp/uvicorn.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8002/api/health >/dev/null 2>&1; then
              echo "API ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::API failed to start within 30s"
          tail -100 /tmp/uvicorn.log
          exit 1

      - name: Install frontend deps
        working-directory: frontend-v2
        run: yarn install --no-progress --non-interactive

      - name: Build production bundle
        working-directory: frontend-v2
        run: yarn build

      - name: Install Playwright Chromium
        working-directory: frontend-v2
        run: yarn e2e:install

      - name: Run Playwright E2E
        working-directory: frontend-v2
        env:
          # vite preview's proxy forwards /api → this. Default in
          # vite.config.ts points at :8001 (the supervisor backend in
          # the dev pod); CI runs on :8002 to coexist with anything
          # else mapped to :8001 on the runner.
          VITE_DEV_API_TARGET: http://127.0.0.1:8002
          CI: 'true'
        run: yarn e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend-v2/playwright-report
          retention-days: 7
