name: Review Lab

on:
  pull_request:
    paths:
      - ".github/workflows/review-lab.yml"
      - "docker-compose.review.yml"
      - "scripts/dev/review_environment.py"
      - "scripts/dev/review_lab/**"
      - "scripts/dev/review_environment_seed.py"
      - "apps/api/src/review_*.py"
      - "frontend-v2/e2e/review-environment.spec.js"
      - "frontend-v2/playwright.config.ts"
      - "frontend-v2/package.json"
      - "frontend-v2/yarn.lock"
      - "docs/development/local-review-test-environment.md"
      - "tests/test_local_review_test_environment.py"
      - "tests/test_db_isolation_guardrails.py"
      - "tests/test_project_state_resolver.py"
      - "tests/test_stage18h2_warehouse_planner_evidence_endpoint.py"
      - "tests/test_stage20b_readonly_status_surfaces.py"
      - "tests/test_stage22b_planner_evidence_hardening.py"
      - "tests/test_stage23a_live_per_system_evidence.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review-lab:
    name: Review Lab
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend-v2/yarn.lock

      - name: Create repo virtualenv and install Python dependencies
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/pip install -r apps/api/requirements.txt
          ./.venv/bin/pip install pytest pytest-asyncio httpx anyio

      - name: Install frontend dependencies
        working-directory: frontend-v2
        run: yarn install --frozen-lockfile --no-progress --non-interactive

      - name: Install Playwright Chromium
        working-directory: frontend-v2
        run: yarn e2e:install

      - name: Confirm Docker Compose support
        run: docker compose version

      - name: Run strict resolver
        run: |
          PYTHONDONTWRITEBYTECODE=1 ./.venv/bin/python -B scripts/dev/resolve_project_state.py --strict

      - name: Run focused Review Lab and safety tests
        run: |
          PYTHONDONTWRITEBYTECODE=1 ./.venv/bin/python -B -m pytest \
            tests/test_local_review_test_environment.py \
            tests/test_db_isolation_guardrails.py \
            tests/test_project_state_resolver.py \
            tests/test_stage18h2_warehouse_planner_evidence_endpoint.py \
            tests/test_stage20b_readonly_status_surfaces.py \
            tests/test_stage22b_planner_evidence_hardening.py \
            tests/test_stage23a_live_per_system_evidence.py \
            -p no:cacheprovider

      - name: Run Review Lab preflight
        run: |
          PYTHONDONTWRITEBYTECODE=1 ./.venv/bin/python -B \
            scripts/dev/review_environment.py preflight

      - name: Run Review Lab full verification
        run: |
          PYTHONDONTWRITEBYTECODE=1 ./.venv/bin/python -B \
            scripts/dev/review_environment.py verify \
            --mode full \
            --scenario all \
            --confirm-local-review-environment

      - name: Check git diff formatting
        if: always()
        run: git diff --check

      - name: Invoke safe Review Lab teardown through wrapper
        if: always()
        run: |
          PYTHONDONTWRITEBYTECODE=1 ./.venv/bin/python -B \
            scripts/dev/review_environment.py down \
            --confirm-local-review-environment

      - name: Assert no Review Lab resources remain
        if: always()
        run: |
          mapfile -t review_containers < <(docker ps -a --filter "label=com.docker.compose.project=edfinder-review" --format '{{.Names}}')
          mapfile -t review_volumes < <(docker volume ls --filter "label=com.docker.compose.project=edfinder-review" --format '{{.Name}}')
          if (( ${#review_containers[@]} > 0 )); then
            printf '::error::Review Lab containers remained after teardown: %s\n' "${review_containers[*]}"
            exit 1
          fi
          if (( ${#review_volumes[@]} > 0 )); then
            printf '::error::Review Lab volumes remained after teardown: %s\n' "${review_volumes[*]}"
            exit 1
          fi

      - name: Write Review Lab job summary
        if: always()
        run: |
          ./.venv/bin/python - <<'PY'
          import json
          from pathlib import Path

          summary_path = Path('/tmp/edfinder-local-review/latest-report.json')
          lines = ['## Review Lab']
          if summary_path.is_file():
              pointer = json.loads(summary_path.read_text(encoding='utf-8'))
              report_path = Path(pointer['report_file'])
              report = json.loads(report_path.read_text(encoding='utf-8'))
              duration_ms = report.get('verify_duration_ms')
              duration_text = f"{duration_ms / 1000:.2f}s" if isinstance(duration_ms, int) else 'unavailable'
              teardown = report.get('phase_results', {}).get('teardown', {})
              remaining = teardown.get('safe_diagnostics', {}).get('remaining_review_resources', {})
              remaining_absent = not remaining.get('containers') and not remaining.get('volumes')
              lines.extend([
                  f"- Review Lab full verification: {'passed' if report.get('ok') else 'failed'}",
                  f"- Full duration: {duration_text}",
                  f"- Delta fallback correlation: {'passed' if report.get('delta_503_fallback_correlation_verified') else 'failed'}",
                  f"- Unexpected console errors: {report.get('unexpected_console_errors') or 'none'}",
                  f"- Unexpected API errors: {report.get('unexpected_api_errors') or 'none'}",
                  f"- Docker baseline restored: {report.get('docker_baseline_restored')}",
                  f"- Review-owned resources absent: {remaining_absent}",
              ])
          else:
              lines.append('- Review Lab full verification: no sanitised report written')
          github_summary = Path(__import__('os').environ['GITHUB_STEP_SUMMARY'])
          github_summary.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - name: Upload sanitised Review Lab report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: review-lab-report
          path: |
            /tmp/edfinder-local-review/latest-report.json
            /tmp/edfinder-local-review/*/report.json
            /tmp/edfinder-local-review/*/browser-summary.json
          if-no-files-found: warn
          retention-days: 7

      - name: Upload isolated Review Lab Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: review-lab-playwright-failure
          path: |
            frontend-v2/test-results
          if-no-files-found: warn
          retention-days: 7
