# ══════════════════════════════════════════════════════════════════════════════
#  ED:Finder — Docker Compose v3.17
#  Services:
#    api     — FastAPI caching proxy + local galaxy DB search
#    web     — Nginx static frontend + API reverse proxy
#    eddn    — EDDN ZeroMQ listener (keeps galaxy.db current in real-time)
#  Bridge networking: web → api:8000
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── FastAPI caching proxy + local galaxy DB ────────────────────────────────
  api:
    build:
      # Build context is the repo root so the Dockerfile can COPY localdb/
      context: .
      dockerfile: backend/Dockerfile
    image: ed-finder-api:latest
    container_name: ed-finder-api
    restart: unless-stopped
    environment:
      DB_PATH:              /data/edfinder.db
      GALAXY_DB_PATH:       /data/galaxy.db
      LOG_LEVEL:            ${LOG_LEVEL:-INFO}
      TTL_SEARCH:           ${TTL_SEARCH:-86400}
      TTL_AUTOCOMPLETE:     ${TTL_AUTOCOMPLETE:-3600}
      TTL_SYSTEM:           ${TTL_SYSTEM:-86400}
      TTL_BODY:             ${TTL_BODY:-86400}
      DAILY_SYSTEMS:        ${DAILY_SYSTEMS:-Sol,Colonia}
      WATCHLIST_CHECK_HOURS: ${WATCHLIST_CHECK_HOURS:-6}
      ALLOWED_ORIGINS:       "*"
    volumes:
      - ./data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/health\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx — static frontend + API reverse proxy ───────────────────────────
  web:
    image: nginx:1.27-alpine
    container_name: ed-finder-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_cache:/var/cache/nginx
      - nginx_run:/var/run
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── EDDN ZeroMQ listener — real-time colonisation updates ─────────────────
  # Subscribes to tcp://eddn.edcd.io:9500 and writes FSDJump / Location
  # events into galaxy.db (colonisation table).
  # Remove or comment out this service if you don't want EDDN updates.
  eddn:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ed-finder-api:latest    # reuse the same image
    container_name: ed-finder-eddn
    restart: unless-stopped
    command: ["python3", "/app/localdb/eddn_listener.py", "--db", "/data/galaxy.db"]
    environment:
      GALAXY_DB_PATH: /data/galaxy.db
    volumes:
      - ./data:/data
    networks:
      - internal                   # internal only — no port exposure needed
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    # Only start EDDN listener once the API is healthy (ensures galaxy.db
    # schema is initialised by the import script first)
    depends_on:
      api:
        condition: service_healthy

networks:
  internal:
    driver: bridge
    name: ed-finder-net

volumes:
  nginx_cache:
    driver: local
  nginx_run:
    driver: local
