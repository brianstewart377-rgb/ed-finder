# ══════════════════════════════════════════════════════════════════════════════
#  ED:Finder — Docker Compose v3.36
#  Services:
#    api     — FastAPI caching proxy + local galaxy DB search
#    web     — Nginx static frontend + API reverse proxy
#    eddn    — EDDN ZeroMQ listener (keeps galaxy.db current in real-time)
#    delta   — Nightly Spansh galaxy_1day.json.gz delta updater (runs at 02:00 UTC)
#  Bridge networking: web → api:8000
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── FastAPI caching proxy + local galaxy DB ────────────────────────────────
  api:
    build:
      # Build context is the repo root so the Dockerfile can COPY localdb/
      context: .
      dockerfile: backend/Dockerfile
    image: ed-finder-api:latest
    container_name: ed-finder-api
    restart: unless-stopped
    environment:
      DB_PATH:              /data/edfinder.db
      GALAXY_DB_PATH:       /data/galaxy.db
      LOG_LEVEL:            ${LOG_LEVEL:-INFO}
      TTL_SEARCH:           ${TTL_SEARCH:-86400}
      TTL_AUTOCOMPLETE:     ${TTL_AUTOCOMPLETE:-3600}
      TTL_SYSTEM:           ${TTL_SYSTEM:-86400}
      TTL_BODY:             ${TTL_BODY:-86400}
      DAILY_SYSTEMS:        ${DAILY_SYSTEMS:-Sol,Colonia}
      WATCHLIST_CHECK_HOURS: ${WATCHLIST_CHECK_HOURS:-6}
      # Search radius cap — raise on Hetzner/desktop, keep at 200 on Pi
      # Pi 4/5: 200, Hetzner CX32: 500, Hetzner CX52+: 750
      MAX_SEARCH_RADIUS_LY:  ${MAX_SEARCH_RADIUS_LY:-200}
      ALLOWED_ORIGINS:       "*"
    volumes:
      - ./data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/health\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx — static frontend + API reverse proxy ───────────────────────────
  web:
    image: nginx:1.27-alpine
    container_name: ed-finder-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_cache:/var/cache/nginx
      - nginx_run:/var/run
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── EDDN ZeroMQ listener — real-time colonisation updates ─────────────────
  # Subscribes to tcp://eddn.edcd.io:9500 and writes FSDJump / Location
  # events into galaxy.db (colonisation table).
  # Remove or comment out this service if you don't want EDDN updates.
  eddn:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ed-finder-api:latest    # reuse the same image
    container_name: ed-finder-eddn
    restart: unless-stopped
    command: ["python3", "/app/localdb/eddn_listener.py", "--db", "/data/galaxy.db"]
    environment:
      GALAXY_DB_PATH: /data/galaxy.db
    volumes:
      - ./data:/data
    networks:
      - internal                   # internal only — no port exposure needed
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    # Only start EDDN listener once the API is healthy (ensures galaxy.db
    # schema is initialised by the import script first)
    depends_on:
      api:
        condition: service_healthy

  # ── Nightly delta — keeps galaxy.db current without full re-import ─────────
  # Downloads galaxy_1day.json.gz from Spansh and applies it to galaxy.db.
  # Runs once at startup (to catch up on any missed days), then at 02:00 UTC
  # every night.  Uses the same image as the api/eddn services.
  # To disable: comment out this service or set DELTA_ENABLED=false.
  #
  # Resource note: the 1-day delta is ~200-400 MB compressed; the import
  # typically takes 5-15 min on a Pi 5.  It runs while the api/eddn services
  # are live — WAL mode ensures reads are unblocked during the write.
  delta:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ed-finder-api:latest
    container_name: ed-finder-delta
    restart: unless-stopped
    # Shell loop: sleep until 02:00 UTC, run delta, sleep 24h, repeat.
    # Also runs once immediately on first start (catches up after downtime).
    command:
      - /bin/sh
      - -c
      - |
        set -e
        log() { echo "[delta] $$(date -u '+%Y-%m-%dT%H:%M:%SZ') $$1"; }
        log "Delta service starting (galaxy.db: $${GALAXY_DB_PATH})"

        # Run once at startup to catch any days missed while the Pi was off
        log "Running startup catch-up delta..."
        python3 /app/localdb/nightly_delta.py --db "$${GALAXY_DB_PATH}" --dest /data \
          && log "Startup delta complete." \
          || log "WARNING: Startup delta failed — will retry tonight."

        # Then loop: sleep until 02:00 UTC, apply delta, repeat
        while true; do
          NOW=$$(date -u +%s)
          # Next 02:00 UTC
          NEXT=$$(date -u -d 'tomorrow 02:00' +%s 2>/dev/null \
                  || python3 -c "
        import time, math
        now=time.time(); day=86400
        target=math.floor(now/day)*day + 7200  # 02:00 UTC
        print(int(target + day if target <= now else target))")
          SLEEP=$$((NEXT - NOW))
          log "Next delta run in $${SLEEP}s (at $$(date -u -d @$$NEXT '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -r $$NEXT '+%Y-%m-%dT%H:%M:%SZ'))"
          sleep $$SLEEP
          log "Running nightly delta..."
          python3 /app/localdb/nightly_delta.py --db "$${GALAXY_DB_PATH}" --dest /data \
            && log "Nightly delta complete." \
            || log "WARNING: Nightly delta failed."
        done
    environment:
      GALAXY_DB_PATH: /data/galaxy.db
    volumes:
      - ./data:/data
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  internal:
    driver: bridge
    name: ed-finder-net

volumes:
  nginx_cache:
    driver: local
  nginx_run:
    driver: local
