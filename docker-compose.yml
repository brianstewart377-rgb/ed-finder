# ══════════════════════════════════════════════════════════════════════════════
#  ED:Finder — Docker Compose (WORKING VERSION with Bridge Networking)
#  Tested and verified configuration
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── FastAPI caching proxy ──────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ed-finder-api:latest
    container_name: ed-finder-api
    restart: unless-stopped
    environment:
      DB_PATH:              /data/edfinder.db
      LOG_LEVEL:            ${LOG_LEVEL:-INFO}
      TTL_SEARCH:           ${TTL_SEARCH:-86400}
      TTL_AUTOCOMPLETE:     ${TTL_AUTOCOMPLETE:-3600}
      TTL_SYSTEM:           ${TTL_SYSTEM:-86400}
      TTL_BODY:             ${TTL_BODY:-86400}
      DAILY_SYSTEMS:        ${DAILY_SYSTEMS:-Sol,Colonia}
      WATCHLIST_CHECK_HOURS: ${WATCHLIST_CHECK_HOURS:-6}
      ALLOWED_ORIGINS:       "*"
    volumes:
      - ./data:/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: ${API_MEMORY_LIMIT:-512m}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/health\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx — static frontend + API reverse proxy ───────────────────────────
  web:
    image: nginx:1.27-alpine
    container_name: ed-finder-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_cache:/var/cache/nginx
      - nginx_run:/var/run
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  internal:
    driver: bridge
    name: ed-finder-net

volumes:
  nginx_cache:
    driver: local
  nginx_run:
    driver: local
