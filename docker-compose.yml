services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  # Tuned for: Hetzner AX41-SSD — i7-8700 (6C/12T), 128 GB RAM, 3×1 TB NVMe RAID-5
  postgres:
    image: postgres:16-alpine
    container_name: ed-postgres
    restart: unless-stopped
    # Postgres uses /dev/shm for parallel hash aggregates (per-worker memory).
    # Default Docker shm is 64 MB — too small for 73M-row GROUP BY aggregates
    # in /api/map/heatmap and similar. 8 GB is safe on the 128 GB host.
    shm_size: '8gb'
    environment:
      POSTGRES_USER:     edfinder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       edfinder
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
      - /data/dumps:/data/dumps:ro
      - /data/logs:/data/logs
    ports:
      - "127.0.0.1:5432:5432"
    command: >
      postgres
        -c shared_buffers=32GB
        -c effective_cache_size=96GB
        -c maintenance_work_mem=8GB
        -c checkpoint_completion_target=0.99
        -c wal_buffers=256MB
        -c default_statistics_target=500
        -c random_page_cost=1.0
        -c effective_io_concurrency=300
        -c work_mem=512MB
        -c max_worker_processes=12
        -c max_parallel_workers_per_gather=6
        -c max_parallel_workers=12
        -c max_parallel_maintenance_workers=6
        -c max_connections=200
        -c log_min_duration_statement=1000
        -c log_line_prefix='%t [%p]: [%l-1] '
        -c log_checkpoints=on
        -c log_connections=off
        -c log_disconnections=off
        -c autovacuum_vacuum_scale_factor=0.05
        -c autovacuum_analyze_scale_factor=0.02
        -c autovacuum_max_workers=4
        -c max_wal_size=32GB
        -c min_wal_size=4GB
        -c wal_compression=on
        -c huge_pages=try
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edfinder -d edfinder"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: 4gb

  # ── pgBouncer (connection pooler) ─────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: ed-pgbouncer
    restart: unless-stopped
    environment:
      DB_USER:      edfinder
      DB_PASSWORD:  ${POSTGRES_PASSWORD}
      DB_HOST:      postgres
      DB_NAME:      edfinder
      POOL_MODE:    transaction          # best for FastAPI async
      MAX_CLIENT_CONN:  500
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      AUTH_TYPE:    md5                  # asyncpg compat — scram-sha-256 causes "wrong password type"
      SERVER_AUTH_TYPE: scram-sha-256    # postgres default auth method
      SERVER_TLS_SSLMODE: disable        # no TLS between pgbouncer and postgres (same host)
    ports:
      - "127.0.0.1:5433:5432"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ed-redis
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 4gb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── FastAPI backend ────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ed-api
    restart: unless-stopped
    environment:
      DATABASE_URL:         postgresql://edfinder:${POSTGRES_PASSWORD}@pgbouncer:5432/edfinder
      REDIS_URL:            redis://redis:6379/0
      LOG_LEVEL:            ${LOG_LEVEL:-INFO}
      TTL_SEARCH:           3600
      TTL_SYSTEM:           86400
      TTL_CLUSTER:          86400
      COMPOSE_PROJECT_DIR:  /opt/ed-finder   # used by admin/rebuild-clusters endpoint
      # Security — admin endpoints disabled unless a token is set in .env.
      ADMIN_TOKEN:          ${ADMIN_TOKEN:-}
      # Comma-separated CORS origins. Override in .env for staging/dev.
      CORS_ORIGINS:         ${CORS_ORIGINS:-https://ed-finder.app,https://www.ed-finder.app}
      # Keep internal error details out of HTTP responses by default.
      EXPOSE_ERROR_DETAIL:  ${EXPOSE_ERROR_DETAIL:-false}
    volumes:
      - /data/logs:/data/logs
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── EDDN Listener ─────────────────────────────────────────────────────────
  eddn:
    build:
      context: ./backend
      dockerfile: Dockerfile.eddn
    container_name: ed-eddn
    restart: unless-stopped
    environment:
      DATABASE_URL:         postgresql://edfinder:${POSTGRES_PASSWORD}@pgbouncer:5432/edfinder
      REDIS_URL:            redis://redis:6379/0
      LOG_LEVEL:            ${LOG_LEVEL:-INFO}
      DIRTY_FLUSH_INTERVAL: 300
    volumes:
      - /data/logs:/data/logs
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy

  # ── Nginx (SSL + static files) ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ed-nginx
    restart: unless-stopped
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/var/www/html:ro   # serve frontend static files (relative to docker-compose.yml)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt:ro
      - /var/log/nginx:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Import runner (one-shot, run manually) ─────────────────────────────────
  # Always use docker compose --profile import run --rm importer <args>
  importer:
    build:
      context: ./backend
      dockerfile: Dockerfile.import
    container_name: ed-importer
    profiles: ["import"]
    env_file:
      - .env
    environment:
      # Explicitly pass the password to bypass any URL caching/conflicts
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL:  postgresql://edfinder:${POSTGRES_PASSWORD}@postgres:5432/edfinder
      DUMP_DIR:     /data/dumps
      BATCH_SIZE:   50000
      LOG_LEVEL:    INFO
      LOG_FILE:     /data/logs/import.log
    volumes:
      - /data/dumps:/data/dumps
      - /data/logs:/data/logs
      # Mount latest scripts directly — no image rebuild needed after code changes
      - ./backend/import_spansh.py:/app/import_spansh.py:ro
      - ./backend/progress.py:/app/progress.py:ro
      - ./backend/build_grid.py:/app/build_grid.py:ro
      - ./backend/build_ratings.py:/app/build_ratings.py:ro
      - ./backend/build_clusters.py:/app/build_clusters.py:ro
      - ./backend/RegionMapData.py:/app/RegionMapData.py:ro
    depends_on:
      postgres:
        condition: service_healthy

  # ── Prometheus (metrics collection) ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ed-prometheus
    profiles: ["monitoring"]
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - api

  # ── Grafana (dashboards) ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ed-grafana
    profiles: ["monitoring"]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_SERVER_ROOT_URL:         "%(protocol)s://%(domain)s:%(http_port)s/"
      GF_INSTALL_PLUGINS:         "grafana-piechart-panel"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus

  # ── postgres-exporter (Postgres metrics for Prometheus) ──────────────────
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: ed-postgres-exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://edfinder:${POSTGRES_PASSWORD}@postgres:5432/edfinder?sslmode=disable"
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres_exporter/queries.yaml
    volumes:
      - ./config/postgres_exporter_queries.yaml:/etc/postgres_exporter/queries.yaml:ro
    ports:
      - "127.0.0.1:9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  # ── redis-exporter (Redis metrics for Prometheus) ─────────────────────────
  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: ed-redis-exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "127.0.0.1:9121:9121"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: ed-finder_default
